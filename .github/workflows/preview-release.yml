name: Preview release

permissions:
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  preview:
    if: >
      github.repository == 'supabase/phoenix' &&
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'trigger: preview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: 'npm'

      # Setup Elixir/OTP for Mix-based build
      - name: Setup Elixir/OTP
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1.23.0
        with:
          elixir-version: '1.18.3'
          otp-version: '27.2'

      - name: Install Mix dependencies
        run: mix deps.get

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: mix assets.build

      - name: Publish preview packages
        run: |
          npx pkg-pr-new@latest publish
