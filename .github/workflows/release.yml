name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.GH_AUTOFIX_APP_ID }}
          private-key: ${{ secrets.GH_AUTOFIX_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

      # Only continue if a release was created
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install latest npm (user prefix)
        if: ${{ steps.release.outputs.release_created }}
        run: |
          mkdir -p "$HOME/.npm-global"
          npm config set prefix "$HOME/.npm-global"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

          npm install -g npm@latest
          npm --version

      # Setup Elixir/OTP for Mix-based build
      - uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1.23.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          elixir-version: '1.18.3'
          otp-version: '27.2'

      - name: Install Mix dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: mix deps.get

      - name: Install npm dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Build assets
        if: ${{ steps.release.outputs.release_created }}
        run: mix assets.build

      - name: Publish to npm (trusted publishing)
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public --provenance
