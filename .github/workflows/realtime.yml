name: Realtime

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  tests:
    name: Realtime (${{ matrix.postgres }} - Partition ${{ matrix.partition }})
    runs-on: ubuntu-latest
    env:
      POSTGRES_IMAGE: ${{ matrix.postgres_image }}
      DB_USER_REALTIME: ${{ matrix.db_user_realtime }}
      PHOENIX_PATH: ${{ github.workspace }}/phoenix
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
        postgres: [pg17]
        include:
          - postgres: pg17
            postgres_image: supabase/postgres:17.6.1.127
            db_user_realtime: supabase_realtime_admin

    steps:
      - name: Checkout Phoenix
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: feat/presence-custom-dispatcher-1.7.19
          path: phoenix

      - name: Checkout Realtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: supabase/realtime
          ref: main
          path: realtime

      - name: Setup elixir
        id: beam
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1.23.0
        with:
          otp-version: 27.x
          elixir-version: 1.18.x

      - name: Cache Mix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            realtime/deps
            realtime/_build
            realtime/priv/native
          key: ${{ github.workflow }}-${{ runner.os }}-mix-${{ env.elixir }}-${{ env.otp }}-${{ hashFiles('realtime/mix.lock') }}
          restore-keys: |
            ${{ github.workflow }}-${{ runner.os }}-mix-${{ env.elixir }}-${{ env.otp }}-

      - name: Cache Docker images
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: docker-cache
        with:
          path: /tmp/docker-images
          key: docker-images-zstd-${{ env.POSTGRES_IMAGE }}
      - name: Load Docker images from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: zstd -d --stdout /tmp/docker-images/postgres.tar.zst | docker image load
      - name: Pull and save Docker images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ${{ env.POSTGRES_IMAGE }}
          mkdir -p /tmp/docker-images
          docker image save ${{ env.POSTGRES_IMAGE }} | zstd -T0 -o /tmp/docker-images/postgres.tar.zst

      - name: Install dependencies
        working-directory: realtime
        run: |
          mix deps.unlock phoenix
          mix deps.get
      - name: Set up Postgres
        working-directory: realtime
        run: docker compose -f compose.dbs.yml up -d --wait
      - name: Start epmd
        run: epmd -daemon
      - name: Run tests
        working-directory: realtime
        run: MIX_TEST_PARTITION=${{ matrix.partition }} mix test --partitions 4
